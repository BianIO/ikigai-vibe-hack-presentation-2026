name: Deploy Slides to GitHub Pages

on:
  push:
    branches: [main]   # 若預設分支是 master 請改這裡
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Slidev
        run: |
          npm init -y
          npm install @slidev/cli@latest @slidev/theme-default@latest

      - name: Build slides
        run: npx slidev build slides/slides.md --base "/${{ github.event.repository.name }}/" --out "$GITHUB_WORKSPACE/dist"

      # GitHub Pages 沒有 SPA fallback,複製一份 404.html,
      # 讓 /…/2 這類深層路徑也能載入同一個入口,再由前端路由接手
      - name: SPA fallback
        run: cp "$GITHUB_WORKSPACE/dist/index.html" "$GITHUB_WORKSPACE/dist/404.html"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
