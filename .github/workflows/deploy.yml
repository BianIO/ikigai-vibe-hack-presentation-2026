name: Deploy Slides to GitHub Pages

on:
  push:
    branches: [main]   # 若預設分支是 master 請改這裡
  workflow_dispatch:    # 也可在 Actions 頁手動觸發

# GitHub Pages 部署所需權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build slides
        run: npx -y @slidev/cli build slides/slides.md --base "/${{ github.event.repository.name }}/" --out dist

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4